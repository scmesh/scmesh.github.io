site_name: SC Mesh
site_url: https://www.sc-mesh.org
repo_url: https://github.com/scmesh/scmesh.github.io/


theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: green
      toggle:
        icon: material/console
        name: Switch to dark mode
  features:
    - navigation.tabs
    - search.share
  icon:
    logo: fontawesome/solid/circle-nodes
  favicon: img/favicon.png

plugins:
  - search
  - blog:
      authors_profiles: true
      blog_toc: true

nav:
  - Home: index.md
  - Blog: blog/index.md
  - Primeiros Passos: primeiros-passos.md
  - Comunidade: comunidade-governanca.md
  - Hardware: hardware.md
  - Infraestrutura: infraestrutura.md
  - Wiki Técnica: wiki-tecnica.md
  - Recursos: recursos.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences